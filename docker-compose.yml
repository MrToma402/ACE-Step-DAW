services:
  ace-step-new:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ace-step-new
    ports:
      - "5176:5176"
    env_file:
      - ../.env
    environment:
      VITE_ACESTEP_API_BASE: "${ACESTEP_API_BASE:-http://host.docker.internal:18101}"
      VITE_ACESTEP_API_KEY: "${API_ACCESS_KEY:-}"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "200"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./:/app
      - ace_step_new_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  ace_step_new_node_modules:
